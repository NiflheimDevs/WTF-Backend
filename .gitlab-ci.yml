# Use the official Golang image for building/testing
image: golang:1.24-alpine

# Cache Go modules to speed up subsequent builds
cache:
  paths:
    - .cache/go-build
    - /go/pkg/mod

variables:
  GOPATH: $CI_PROJECT_DIR/.cache/go-build
  GOPROXY: "https://mirror-go.runflare.com" # Using the proxy from your Dockerfile
  APP_NAME: "api"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"

stages:
  - lint
  - test
  - build
  - package

# 1. Lint Stage: Checks code quality
lint:
  stage: lint
  image: golangci/golangci-lint:v1.64-alpine
  script:
    - golangci-lint run -v

# 2. Test Stage: Runs unit tests
unit_tests:
  stage: test
  script:
    - go test -v ./...

