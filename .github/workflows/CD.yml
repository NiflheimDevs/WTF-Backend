name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - feature/CICD

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DEPLOY_DIR: /home/debian/backend
  DOCKER_BUILDKIT: "1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_FILE" > .env
          chmod 600 .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PAT }}

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build and push Docker image
        run: |
          docker compose build
          docker compose push

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p "${{ env.DEPLOY_DIR }}/db/migrations"

      - name: Copy Docker Compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Copy environment file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: .env
          target: ${{ env.DEPLOY_DIR }}

      - name: Copy database migration
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: db/migrations/001_create_initial_schema.up.sql
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail

            cd "${{ env.DEPLOY_DIR }}"
            chmod 600 .env

            docker compose pull
            docker compose up -d --remove-orphans
            docker container prune -f
            docker image prune -f
